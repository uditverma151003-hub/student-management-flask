{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-5 animate-fade-up">
            <div class="text-center mb-4">
                <div class="icon-wrapper mx-auto mb-3" style="width: 60px; height: 60px; font-size: 28px;">
                    <i class="ph-fill ph-user-plus"></i>
                </div>
                <h3 class="mb-1 text-gradient">Enroll Student</h3>
                <p class="text-muted">Enter the details of the new student below</p>
            </div>

            {% if message %}
                <div class="alert alert-info mb-4">
                    <i class="ph-fill ph-info"></i> {{ message }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small px-1">Full Name</label>
                    <input type="text" name="name" placeholder="E.g. John Doe" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small px-1">Age</label>
                    <input type="number" name="age" placeholder="E.g. 20" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small px-1">Grade</label>
                    <input type="text" name="grade" placeholder="E.g. A" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-vibrant w-100 mt-2">Add Student</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
