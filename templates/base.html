<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Hub</title>
    <!-- Bootstrap CSS for grid system primarily -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Vibrant CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons for modern vector icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4 mb-4">
    <div class="container-fluid">
        <a class="navbar-brand text-gradient" href="/">
            <i class="ph ph-student"></i> SDMS
        </a>
        <div class="d-flex gap-2 align-items-center">
            <a href="/" class="nav-link-btn d-flex align-items-center gap-2"><i class="ph-bold ph-house"></i> Home</a>
            <a href="/add" class="nav-link-btn d-flex align-items-center gap-2"><i class="ph-bold ph-plus-circle"></i> Add</a>
            <a href="/search" class="nav-link-btn d-flex align-items-center gap-2"><i class="ph-bold ph-magnifying-glass"></i> Search</a>
            <a href="/view" class="nav-link-btn d-flex align-items-center gap-2"><i class="ph-bold ph-list-dashes"></i> View</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
