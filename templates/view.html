{% extends "base.html" %}

{% block content %}
<div class="card shadow p-4">
    <h3 class="mb-3">📄 All Student Records</h3>

    {% if students %}
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.age }}</td>
                <td>{{ s.grade }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="text-muted">No records available.</p>
    {% endif %}
</div>
{% endblock %}
