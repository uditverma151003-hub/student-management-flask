{% extends "base.html" %}

{% block content %}
<div class="card shadow p-4">
    <h3 class="mb-3">🗑 Delete Student</h3>

    {% if message %}
        <div class="alert alert-warning">{{ message }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="name" placeholder="Enter student name to delete" class="form-control mb-3" required>
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
</div>
{% endblock %}
