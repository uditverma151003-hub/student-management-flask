{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-5 animate-fade-up">
            <div class="text-center mb-4">
                <div class="icon-wrapper mx-auto mb-3" style="width: 60px; height: 60px; font-size: 28px; background: rgba(225, 29, 72, 0.1); color: #e11d48;">
                    <i class="ph-fill ph-trash"></i>
                </div>
                <h3 class="mb-1" style="color: #e11d48;">Remove Record</h3>
                <p class="text-muted">Permanently delete a student from the database</p>
            </div>

            {% if message %}
                <div class="alert alert-info mb-4">
                    <i class="ph-fill ph-info"></i> {{ message }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small px-1">Exact Student Name</label>
                    <input type="text" name="name" placeholder="Who needs to be removed?" class="form-control" required style="border-color: rgba(225, 29, 72, 0.2);">
                </div>
                <button type="submit" class="btn btn-vibrant btn-danger-vibrant w-100">Delete Permanently</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
