{% extends "base.html" %}

{% block content %}
<div class="card shadow p-4">
    <h3 class="mb-3">🔍 Search Student</h3>

    <form method="POST">
        <input type="text" name="name" placeholder="Enter student name" class="form-control mb-3" required>
        <button type="submit" class="btn btn-success">Search</button>
    </form>

    {% if student %}
        <div class="alert alert-info mt-4">
            <strong>Result:</strong><br>
            Name: {{ student.name }}<br>
            Age: {{ student.age }}<br>
            Grade: {{ student.grade }}
        </div>
    {% elif searched %}
        <div class="alert alert-danger mt-4">Student not found</div>
    {% endif %}
</div>
{% endblock %}
